name: Deploy Python Worker

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install Wrangler
        run: npm ci

      - name: Prepare Worker config
        working-directory: worker-python
        run: cp wrangler.toml.example wrangler.toml

      - name: Deploy Cloudflare Python Worker
        working-directory: worker-python
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: uvx --from workers-py pywrangler deploy --config wrangler.toml
